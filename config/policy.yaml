version: 1
mode: deny_list_only

deny_bash_patterns:
  # filesystem nukes
  - '\brm\s+-rf\s+/(\s|$)'
  - '\brm\s+-rf\s+~(\s|$)'
  - '\brm\s+-rf\s+\$HOME(\s|$)'
  - '\bdd\s+.*\bof=/dev/(sd|nvme|mmcblk|hd)'
  - '\bmkfs\.'
  - '\b(shred|wipe)\b.*\s/'
  - ':\(\)\s*\{\s*:\|:&\s*\};:'
  # pipe-to-shell
  - '\b(curl|wget|fetch)\b[^|]*\|\s*(sudo\s+)?(sh|bash|zsh|ksh|fish)\b'
  # privilege escalation surprises
  - '^\s*sudo\s+rm\b'
  - '^\s*sudo\s+dd\b'
  - '\bchmod\s+-R\s+777\s+/'
  # silent credential exfil signatures
  - '\b(cat|tar|zip)\b.*\b(\.ssh/id_|\.aws/credentials|\.config/gh|\.netrc)\b.*\|\s*(curl|nc|wget)'
  # nuke-the-repo
  - '\bgh\s+repo\s+delete\b'
  - '\bgit\s+push\s+.*--force(-with-lease)?.*\s(main|master)(\s|$)'

deny_tools: []

# allow_tools: used when mode is "allow_list" — only listed tools are permitted.
# allow_tools:
#   - Read
#   - Bash
#   - Grep
#   - Glob
